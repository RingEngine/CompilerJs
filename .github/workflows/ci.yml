name: CI

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version:
          - 20
          - 22

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Verify publish artifacts
        run: npm run pack:dry-run

  pr-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare PR preview packages
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_NUMBER: ${{ github.run_number }}
        run: npm run pr:prepare-packages

      - name: Pack PR preview tarballs
        shell: bash
        run: |
          set -euo pipefail
          for pkg in core packer cli; do
            (cd ".artifacts/pr-${{ github.event.pull_request.number }}/$pkg" && npm pack)
          done

      - name: Upload PR preview artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ github.event.pull_request.number }}-packages
          path: .artifacts/pr-${{ github.event.pull_request.number }}
          if-no-files-found: error
